# ==================================
# SonarQube Project Configuration
# ==================================
sonar.projectKey=deakin-app
sonar.projectName=Deakin Learning App
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/test-results/**,**/*.config.js

# JavaScript/JSX analysis
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate thresholds (custom)
# These are evaluated on the SonarQube server side.
# Configured here for documentation; actual gates set in SonarQube UI.
# - Code coverage > 60%
# - Duplicated lines < 10%
# - Maintainability rating = A
# - Reliability rating = A
# - Security rating = A
# - No new critical or blocker issues
